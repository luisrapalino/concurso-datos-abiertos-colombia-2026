services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: epintel
      POSTGRES_PASSWORD: epintel
      POSTGRES_DB: epintel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epintel -d epintel"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://epintel:epintel@db:5432/epintel
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      SOCRATA_APP_TOKEN: ${SOCRATA_APP_TOKEN:-}
      INGESTION_BATCH_SIZE: ${INGESTION_BATCH_SIZE:-1000}
      INGESTION_END_YEAR: ${INGESTION_END_YEAR:-2018}
      INGESTION_VALIDATE_TERRITORIAL_CODES: ${INGESTION_VALIDATE_TERRITORIAL_CODES:-true}
    volumes:
      - ./backend/ml/artifacts:/app/ml/artifacts
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      args:
        API_INTERNAL_URL: http://api:8000
    ports:
      - "3000:3000"
    environment:
      API_INTERNAL_URL: http://api:8000
    depends_on:
      - api

  ingestion-worker:
    build:
      context: ./backend
    entrypoint:
      [
        "sh",
        "-c",
        "cd /app && alembic -c /app/alembic.ini upgrade head && exec python -m modules.epidemiological_surveillance.interfaces.scheduler",
      ]
    environment:
      DATABASE_URL: postgresql+psycopg://epintel:epintel@db:5432/epintel
      INGESTION_SCHEDULE_ENABLED: "true"
      INGESTION_INTERVAL_HOURS: "24"
      INGESTION_DEFAULT_YEARS: "2018,2019,2020"
      INGESTION_DEFAULT_LIMIT: "15000"
      INGESTION_BATCH_SIZE: "1000"
      INGESTION_END_YEAR: "2018"
      INGESTION_VALIDATE_TERRITORIAL_CODES: "true"
      SOCRATA_APP_TOKEN: ${SOCRATA_APP_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
