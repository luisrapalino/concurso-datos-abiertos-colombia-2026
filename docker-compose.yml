services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: epintel
      POSTGRES_PASSWORD: epintel
      POSTGRES_DB: epintel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epintel -d epintel"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://epintel:epintel@db:5432/epintel
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
