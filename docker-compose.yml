services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: epintel
      POSTGRES_PASSWORD: epintel
      POSTGRES_DB: epintel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epintel -d epintel"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://epintel:epintel@db:5432/epintel
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      args:
        API_INTERNAL_URL: http://api:8000
    ports:
      - "3000:3000"
    environment:
      API_INTERNAL_URL: http://api:8000
    depends_on:
      - api

volumes:
  postgres_data:
