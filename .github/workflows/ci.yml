name: CI

on:
  push:
    branches: [main, master]
  pull_request:

defaults:
  run:
    working-directory: backend

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: epintel
          POSTGRES_PASSWORD: epintel
          POSTGRES_DB: epintel
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U epintel -d epintel"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://epintel:epintel@localhost:5432/epintel

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check src tests

      - name: Apply migrations
        run: alembic -c alembic.ini upgrade head

      - name: Pytest
        run: pytest

      - name: Docker build
        run: docker build -t epintel-api .
